version: '3.8'

# 跨宿主机 Pod 通信 Demo - Docker 版本
#
# 拓扑结构:
#   host-a (192.168.30.132)          host-b (192.168.30.134)
#   ┌─────────────────────┐          ┌─────────────────────┐
#   │  pod-a              │◄─────────►│  pod-b              │
#   │  10.244.2.2/24     │  Docker   │  10.244.1.2/24     │
#   │                     │  network  │                    │
#   └─────────────────────┘          └─────────────────────┘

services:
  # 宿主机 A 的 Pod
  pod-a:
    image: alpine:latest
    container_name: pod-a
    hostname: pod-a
    networks:
      pod-net-a:
        ipv4_address: 10.244.2.2
    command: ["sleep", "infinity"]
    privileged: true
    sysctls:
      - net.ipv4.ip_forward=1

  # 宿主机 B 的 Pod
  pod-b:
    image: alpine:latest
    container_name: pod-b
    hostname: pod-b
    networks:
      pod-net-b:
        ipv4_address: 10.244.1.2
    command: ["sleep", "infinity"]
    privileged: true
    sysctls:
      - net.ipv4.ip_forward=1

  # 路由节点 (可选，用于连接两个网络)
  router:
    image: alpine:latest
    container_name: router
    hostname: router
    networks:
      pod-net-a:
        ipv4_address: 10.244.2.1
      pod-net-b:
        ipv4_address: 10.244.1.1
    command: ["sleep", "infinity"]
    privileged: true
    sysctls:
      - net.ipv4.ip_forward=1
    cap_add:
      - NET_ADMIN

networks:
  pod-net-a:
    driver: bridge
    ipam:
      config:
        - subnet: 10.244.2.0/24
          gateway: 10.244.2.1
  pod-net-b:
    driver: bridge
    ipam:
      config:
        - subnet: 10.244.1.0/24
          gateway: 10.244.1.1
